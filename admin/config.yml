backend:
  name: git-gateway
  branch: main

media_folder: ""
public_folder: "/"

collections:

  - name: "website"
    label: "Website Content"
    files:

      - file: "index.html"
        label: "Main Website"
        name: "main"

        fields:

          - label: "Website Title"
            name: "title"
            widget: "string"
            default: "Ink & Ayat"

          - label: "Hero Description"
            name: "hero_description"
            widget: "text"

          - label: "WhatsApp Number"
            name: "whatsapp"
            widget: "string"
            default: "923305532054"

          - label: "Logo Image"
            name: "logo"
            widget: "image"

          - label: "Products"
            name: "products"
            widget: "list"

            fields:

              - label: "Product Name"
                name: "name"
                widget: "string"

              - label: "Price"
                name: "price"
                widget: "string"

              - label: "Description"
                name: "description"
                widget: "text"

              - label: "Product Image"
                name: "image"
                widget: "image"
